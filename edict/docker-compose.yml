# ══════════════════════════════════════════════════════
# Edict 三省六部 — 纯 Agent 调度服务 Docker Compose
# ══════════════════════════════════════════════════════

services:
  # ── 后端服务 ──

  backend:
    build:
      context: .
      dockerfile: edict/Dockerfile
    ports:
      - "8000:8000"
    environment:
      EDICT_HOME: /edict
      PORT: 8000
      DEBUG: "true"
    volumes:
      - ~/.claude/edict/data:/edict/data
      - ~/.claude/edict/scripts:/edict/scripts
      - ./agents:/app/agents:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── 前端 ──

  frontend:
    build:
      context: ./edict/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    depends_on:
      - backend
    restart: unless-stopped
